syntax = "proto3";

package asrc;

option go_package = "github.com/ParkWardRR/asrc-resampler-narechia/grpc";

service ASRCService {
  rpc ProcessStream (stream ProcessRequest) returns (stream ProcessResponse) {}
}

message ProcessRequest {
  string stream_id = 1;
  double ratio = 2;
  repeated double payload = 3;
}

message ProcessResponse {
  string stream_id = 1;
  repeated double payload = 2;
}
